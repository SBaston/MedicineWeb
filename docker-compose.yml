version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════════
  # BASE DE DATOS POSTGRESQL
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: postgres:15
    container_name: NexusSalud-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: NexusSaludDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - NexusSalud-network

  # ═══════════════════════════════════════════════════════════════
  # REDIS CACHE
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7
    container_name: NexusSalud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - NexusSalud-network

  # ═══════════════════════════════════════════════════════════════
  # BACKEND API (.NET) con Tesseract OCR y HTTPS
  # ═══════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./MedicineBackend/MedicineBackend
      dockerfile: Dockerfile
    container_name: NexusSalud-backend
    environment:
      # Conexión a PostgreSQL
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=NexusSaludDB;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      
      # Configuración ASPNETCORE - HTTPS
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "https://+:443;http://+:80"
      
      # Certificado HTTPS (desarrollo con certificado auto-firmado)
      ASPNETCORE_Kestrel__Certificates__Default__Password: "NeRf3r0Pr1M3"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/https/aspnetapp.pfx"
      
      # JWT - HTTPS
      JwtSettings__Issuer: "https://localhost:5001"
      JwtSettings__Audience: "https://localhost:5173"
      JwtSettings__SecretKey: "TuClaveSecretaMuySeguraDeAlMenos32CaracteresParaJWT2024!"
      JwtSettings__ExpirationMinutes: "60"
      
      # CORS: Permitir frontend HTTPS
      AllowedOrigins: "https://localhost:5173,http://localhost:5173"
      
      # Tesseract OCR
      TESSDATA_PREFIX: "/app/tessdata"
      
      # File Storage
      FileStorage__BasePath: "/app/uploads"
      FileStorage__MaxFileSizeMB: "10"
      
    ports:
      - "5000:80"    # HTTP
      - "5001:443"   # HTTPS
    volumes:
      # Volumen para uploads
      - uploads_data:/app/uploads
      # Montar certificados (crear directorio ./certs primero)
      - ./certs:/https:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - NexusSalud-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND (React + Vite) con HTTPS
  # ═══════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./MedicineFrontend/medicinefrontend
      dockerfile: Dockerfile
      args:
        # URL del backend HTTPS
        VITE_API_URL: "https://localhost:5001/api"
    container_name: NexusSalud-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - NexusSalud-network
    restart: unless-stopped

# ═══════════════════════════════════════════════════════════════
# VOLÚMENES PERSISTENTES
# ═══════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

# ═══════════════════════════════════════════════════════════════
# RED INTERNA
# ═══════════════════════════════════════════════════════════════
networks:
  NexusSalud-network:
    driver: bridge