version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: NexusSalud-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: NexusSaludDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - NexusSalud-network

  redis:
    image: redis:7
    container_name: NexusSalud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - NexusSalud-network

  backend:
    build:
      context: ./MedicineBackend/MedicineBackend
      dockerfile: Dockerfile
    container_name: NexusSalud-backend
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=NexusSaludDB;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5000"
      
      JwtSettings__Issuer: "http://localhost:5000"
      JwtSettings__Audience: "http://localhost:5173"
      JwtSettings__SecretKey: "TuClaveSecretaMuySeguraDeAlMenos32CaracteresParaJWT2024!"
      JwtSettings__ExpirationMinutes: "60"
      
      TESSDATA_PREFIX: "/app/tessdata"
      FileStorage__BasePath: "/app/uploads"
      FileStorage__MaxFileSizeMB: "10"
      
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - NexusSalud-network
    restart: unless-stopped

  frontend:
    build:
      context: ./MedicineFrontend/medicinefrontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5000/api"
    container_name: NexusSalud-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - NexusSalud-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  NexusSalud-network:
    driver: bridge