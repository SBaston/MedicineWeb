version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════════
  # BASE DE DATOS POSTGRESQL
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: postgres:15
    container_name: NexusSalud-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: NexusSaludDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - NexusSalud-network

  # ═══════════════════════════════════════════════════════════════
  # REDIS CACHE
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7
    container_name: NexusSalud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - NexusSalud-network

  # ═══════════════════════════════════════════════════════════════
  # BACKEND API (.NET) con Tesseract OCR
  # ═══════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./MedicineBackend/MedicineBackend
      dockerfile: Dockerfile
    container_name: NexusSalud-backend
    environment:
      # Conexión a PostgreSQL (usa el nombre del servicio 'postgres')
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=NexusSaludDB;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      
      # Configuración ASPNETCORE
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5000"
      
      # CORS: Permitir el frontend
      # IMPORTANTE: Ajusta estas URLs según tu configuración
      # Localhost: http://localhost:5173
      # Red local: http://192.168.1.X:5173
      # Producción: https://tu-dominio.com
      AllowedOrigins: "http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.100:5173"
      
      # Tesseract OCR
      TESSDATA_PREFIX: "/app/tessdata"
      
      # File Storage
      FileStorage__BasePath: "/app/uploads"
      FileStorage__MaxFileSizeMB: "10"
      
    ports:
      - "5000:5000"
    volumes:
      # Volumen para persistir imágenes de documentos
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - NexusSalud-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND (React + Vite)
  # ═══════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./MedicineFrontend/medicinefrontend
      dockerfile: Dockerfile
      args:
        # URL del backend que el NAVEGADOR usará
        # IMPORTANTE: Debe ser accesible desde el navegador del cliente
        # Mismo PC: http://localhost:5000/api
        # Otra PC en red local: http://192.168.1.X:5000/api
        # Producción: https://api.tu-dominio.com
        VITE_API_URL: "http://localhost:5000/api"
    container_name: NexusSalud-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - NexusSalud-network
    restart: unless-stopped

# ═══════════════════════════════════════════════════════════════
# VOLÚMENES PERSISTENTES
# ═══════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

# ═══════════════════════════════════════════════════════════════
# RED INTERNA (CORREGIDO: NexusSalud-network)
# ═══════════════════════════════════════════════════════════════
networks:
  NexusSalud-network:
    driver: bridge